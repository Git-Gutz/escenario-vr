<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D VR | Ingeniería en Sistemas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            background-color: #0f0f0f;
        }
        
        main {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, #2a2a2a 0%, #0f0f0f 100%);
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            outline: none;
        }

        /* Posicionamiento del botón VR por encima del footer */
        #VRButton {
            z-index: 10;
            bottom: 100px !important; 
            padding: 12px 24px !important;
            border: 1px solid rgba(13, 202, 240, 0.5) !important;
            border-radius: 8px !important;
            background: rgba(15, 15, 15, 0.7) !important;
            color: #0dcaf0 !important;
            font-weight: 600 !important;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease !important;
        }

        #VRButton:hover {
            background: rgba(13, 202, 240, 0.2) !important;
            border-color: #0dcaf0 !important;
            box-shadow: 0 0 15px rgba(13, 202, 240, 0.3);
        }

        .navbar {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background-color: rgba(33, 37, 41, 0.95) !important;
            backdrop-filter: blur(10px);
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand text-info fw-bold" href="#">Render VR</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link active">Evidencia de Aprendizaje</span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main id="canvas-container" style="margin-top: 56px;">
        </main>

    <footer class="bg-dark py-4 mt-auto border-top border-secondary">
        <div class="container text-center text-secondary">
            <p class="mb-1 text-light">Desarrollado por Leonardo Gutiérrez Jiménez|Ingeniería en Sistemas Computacionales</p>
            <small>&copy; 2026 Todos los derechos reservados.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        const container = document.getElementById('canvas-container');
        
        // 1. CONFIGURACIÓN DE LA ESCENA
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        // 2. ARQUITECTURA WEBXR (CAMERA RIG)
        const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 100);
        
        // Estante base para mover al usuario en el espacio virtual
        const playerRig = new THREE.Group();
        scene.add(playerRig);
        playerRig.add(camera);

        // Posición inicial por defecto de la cámara con respecto al Rig (altura de ojos estándar)
        camera.position.set(0, 1.6, 0);

        // 3. RENDERER CON PIPELINE PARA MATERIALES PBR
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.xr.enabled = true;
        
        // Mapeo de color estricto para evitar texturas lavadas o negras
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        
        container.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        // 4. ILUMINACIÓN AMBIENTAL (Corrección de zonas oscuras interiores)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.8);
        scene.add(ambientLight);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 7.5);
        scene.add(dirLight);

        // 5. CONTROLES ESCRITORIO
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 6. CARGA Y ENRUTAMIENTO DINÁMICO DEL SPAWN POINT
        const loader = new GLTFLoader();
        loader.load('modelo.glb', function (gltf) {
            const model = gltf.scene;
            
            // Corrección de normales y opacidad en caras ocultas de SketchUp
            model.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.material.side = THREE.DoubleSide; 
                    child.material.metalness = 0.0; // Evita el look negro reflectivo masivo
                    child.material.roughness = 0.8;
                    child.material.needsUpdate = true;
                }
            });

            scene.add(model);

            // Algoritmo de cálculo del Bounding Box
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            
            // Coloca el Rig en el centro exacto del plano X y Z, apuntando al piso del modelo (box.min.y)
            // WebXR gestionará automáticamente la altura física del visor sobre este punto.
            playerRig.position.set(center.x, box.min.y, center.z);
            
            // Reorientar el foco de los controles de escritorio al centro
            controls.target.set(center.x, box.min.y + 1.6, center.z - 0.1);
            controls.update();
            
            console.log('Spawn configurado automáticamente en el centro del modelo.');
        }, undefined, function (error) {
            console.error('Error crítico al cargar el modelo GLB:', error);
        });

        // 7. MANEJO DE RESIZE
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // 8. ANIMATION LOOP
        renderer.setAnimationLoop(function () {
            // Solo actualiza controles si no se está ejecutando la sesión XR
            if (!renderer.xr.isPresenting) {
                controls.update();
            }
            renderer.render(scene, camera);
        });
    </script>
</body>
</html>
